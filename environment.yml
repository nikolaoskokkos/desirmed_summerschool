name: cmip6-esgf-opendap
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Core scientific stack
  - numpy>2                # numba <0.60 and icclim <7 reference numpy._no_nep50_warning removed in numpy 2.0
  - pandas
  - matplotlib-base
  - xarray>2024.2  # icclim <7 imports xarray.core.arithmetic removed in xarray 2024.2
  # ESGF federated search (wraps the Solr REST API across all nodes)
  - esgf-pyclient
  # ESGF search API calls
  - requests
  # OPeNDAP / netCDF remote data access
  - netcdf4
  # cftime-based time axes (DatetimeNoLeap) used by the data
  - cftime
  # Lazy/parallel loading of OPeNDAP-backed datasets
  - dask
  # Geographic projections, coastlines and map features
  - cartopy
  # Intake catalog interface for CMIP6 (cloud + ESGF collections)
  - intake-esm
  # Zarr store access (cloud-hosted CMIP6 zarr datasets)
  - zarr
  - fsspec
  - gcsfs
  # Climate indices and bias adjustment
  - xclim
  - icclim
  # Statistical visualization on top of matplotlib
  - seaborn
  # Progress bars for loops / long-running cells
  - tqdm
  # Interactive maps (hvPlot + GeoViews + Bokeh backend)
  - hvplot
  - geoviews
  - bokeh
  # Jupyter so Binder can launch the notebook
  - jupyterlab
  - notebook
